apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: qa
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      command: ["/bin/sh", "-c", "echo 'Hello from QA' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      ports:
        - containerPort: 80
